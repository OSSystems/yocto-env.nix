name: "Update packages"
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}
  cancel-in-progress: true
permissions:
  contents: write
  pull-requests: write
jobs:
  oelint:
    runs-on: ubuntu-latest
    steps:
      - uses: ossystems/nix-actions@v1
        id: nix
        with:
          install-nix: true
          token-owner: OSSystems
          app-id: ${{ vars.UPDATE_PACKAGES_APP_ID }}
          app-private-key: ${{ secrets.UPDATE_PACKAGES_APP_PRIVATE_KEY }}
          flake-check: false
          build-hosts: false
          build-devshells: false
      - name: Update oelint-parser and oelint-adv
        run: |
          nix run nixpkgs#nix-update -- --flake --version=stable oelint-parser
          nix run nixpkgs#nix-update -- --flake --version=stable oelint-adv
      - name: Format
        run: nix fmt
      - name: Open pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.nix.outputs.token }}
          branch: update/oelint
          delete-branch: true
          title: "oelint: update oelint-adv and oelint-parser"
          commit-message: "oelint: update oelint-adv and oelint-parser"
          body: |
            Automated daily bump of the in-tree `oelint-adv` and `oelint-parser`
            packages to their latest upstream releases.
