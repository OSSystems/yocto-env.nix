name: "Update packages"
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}
  cancel-in-progress: true
permissions:
  contents: write
  pull-requests: write
jobs:
  oelint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # A non-GITHUB_TOKEN identity so the PR triggers ci.yaml.
      - name: Generate a token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.UPDATE_PACKAGES_APP_ID }}
          private-key: ${{ secrets.UPDATE_PACKAGES_APP_PRIVATE_KEY }}
      - uses: nixbuild/nix-quick-install-action@v34
      - name: Restore and cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.*') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
      - name: Update oelint-parser and oelint-adv
        # Parser first: oelint-adv builds against the in-tree parser.
        run: |
          nix run nixpkgs#nix-update -- --flake --version=stable oelint-parser
          nix run nixpkgs#nix-update -- --flake --version=stable oelint-adv
      - name: Format
        run: nix fmt
      - name: Open pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: update/oelint
          delete-branch: true
          title: "oelint: update oelint-adv and oelint-parser"
          commit-message: "oelint: update oelint-adv and oelint-parser"
          body: |
            Automated daily bump of the in-tree `oelint-adv` and `oelint-parser`
            packages to their latest upstream releases.
